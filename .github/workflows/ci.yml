name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read
  checks: write        # needed for test-reporter to post results

jobs:
  # ── JOB 1: Run Tests ─────────────────────────────────────────
  test:
    name: Run JUnit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run JUnit Tests
        run: mvn test -Dspring.profiles.active=test

      - name: Generate Test Report
        if: always()
        uses: dorny/test-reporter@v1.9.1
        with:
          name: JUnit Test Results
          path: target/surefire-reports/*.xml
          reporter: java-junit

      - name: Check Test Pass Rate (must be > 50%)
        run: |
          TOTAL=$(grep -r 'tests=' target/surefire-reports/*.xml | grep -oP 'tests="\K[0-9]+' | awk '{sum+=$1} END {print sum}')
          FAILURES=$(grep -r 'failures=' target/surefire-reports/*.xml | grep -oP 'failures="\K[0-9]+' | awk '{sum+=$1} END {print sum}')
          ERRORS=$(grep -r 'errors=' target/surefire-reports/*.xml | grep -oP 'errors="\K[0-9]+' | awk '{sum+=$1} END {print sum}')

          FAILED=$((FAILURES + ERRORS))
          PASSED=$((TOTAL - FAILED))

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Total Tests  : $TOTAL"
          echo "  Passed       : $PASSED"
          echo "  Failed       : $FAILED"

          if [ "$TOTAL" -eq 0 ]; then
            echo "  ❌ No tests found! Blocking deployment."
            exit 1
          fi

          PASS_RATE=$(echo "scale=2; $PASSED * 100 / $TOTAL" | bc)
          echo "  Pass Rate    : $PASS_RATE%"
          echo "  Threshold    : 50%"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          PASS_INT=$(echo "scale=0; $PASSED * 100 / $TOTAL" | bc)

          if [ "$PASS_INT" -lt 50 ]; then
            echo "  ❌ Pass rate $PASS_RATE% is below 50%. Blocking deployment!"
            exit 1
          else
            echo "  ✅ Pass rate $PASS_RATE% meets threshold. Proceeding to deploy!"
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  # ── JOB 2: Build & Deploy ─────────────────────────────────────
  build-deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: projects/1025569029916/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@createorder-490108.iam.gserviceaccount.com

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker to use GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build Docker Image
        run: docker build -t gcr.io/${{ secrets.PROJECT_ID }}/employee-service:${{ github.sha }} .

      - name: Push Docker Image to GCR
        run: docker push gcr.io/${{ secrets.PROJECT_ID }}/employee-service:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: gcloud run deploy employee-service --image=gcr.io/${{ secrets.PROJECT_ID }}/employee-service:${{ github.sha }} --platform=managed --region=asia-south1 --allow-unauthenticated --add-cloudsql-instances=createorder-490108:asia-south1:emp-db-new --memory=512Mi --project=${{ secrets.PROJECT_ID }}

      - name: Print Deployed URL
        run: |
          URL=$(gcloud run services describe employee-service --region=asia-south1 --format='value(status.url)' --project=${{ secrets.PROJECT_ID }})
          echo "✅ Deployed successfully!"
          echo "🌐 Live URL: $URL"